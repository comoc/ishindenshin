<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#9d2933" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="意思伝達" />
  <title>意思伝達アプリ</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <script>
    /* localStorage で明示指定されたテーマを CSS 適用前に反映してフラッシュを防ぐ。
       未指定時は CSS の @media (prefers-color-scheme) が OS 設定に追従する */
    (function () {
      var t = localStorage.getItem('theme');
      if (t === 'light' || t === 'dark') {
        document.documentElement.setAttribute('data-theme', t);
      }
    })();
  </script>
  <link rel="stylesheet" href="styles.css?v=34" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="title">意思伝達</div>
      <div class="hint">スイッチ：<kbd>Space</kbd> / <kbd>Enter</kbd> または ○✕△□ / A B X Y</div>
      <div class="input-status" aria-label="入力デバイス接続状態">
        <span class="input-status-item" id="kbd-status" title="キーボード（未検出）">⌨</span>
        <span class="input-status-item" id="pad-status" title="ゲームパッド（未接続）">🎮</span>
      </div>
    </header>

    <section class="text-area">
      <textarea id="composed" readonly placeholder="ここに作成した文章が表示されます"></textarea>
    </section>

    <main id="panel-host" aria-live="polite"></main>

    <footer class="settings-bar">
      <div class="settings-left">
        <button type="button" class="speed-btn" id="btn-help" aria-label="ヘルプを表示">❓ ヘルプ</button>
        <button type="button" class="speed-btn" id="btn-theme" aria-label="表示テーマを切り替え">🌓 テーマ</button>
      </div>
      <div class="settings-right">
        <span>走査速度：<strong id="speed-label">1.0秒</strong></span>
        <span class="speed-btn" id="btn-slower">遅く [←]</span>
        <span class="speed-btn" id="btn-faster">速く [→]</span>
      </div>
    </footer>

    <div class="overlay hidden" id="overlay"></div>
    <div class="toast hidden" id="toast"></div>
    <div id="install-snackbar" class="install-snackbar" role="status" aria-live="polite">
      <div class="install-snackbar-body">
        <div class="install-snackbar-title" id="install-snackbar-title">アプリをインストール</div>
        <div class="install-snackbar-text" id="install-snackbar-text">ホーム画面に追加するとオフラインでも使えます</div>
      </div>
      <button type="button" id="btn-install" class="install-snackbar-btn">インストール</button>
      <button type="button" id="btn-install-dismiss" class="install-snackbar-close" aria-label="閉じる">×</button>
    </div>
  </div>
  <script src="app.js?v=34" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
